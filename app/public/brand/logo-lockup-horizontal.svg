<?xml version="1.0" encoding="UTF-8"?>
<!--
  10XAI horizontal lockup — monogram + wordmark
  Use in header navigation when you want both the symbol and the full name.
  Total ratio ~5:1, suitable for navigation bars at ~32-40px tall.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100" role="img" aria-label="10XAI">
  <title>10XAI</title>
  <!-- Monogram block -->
  <rect width="100" height="100" rx="16" fill="#0C0A09"/>
  <text
    x="50" y="68"
    font-family="'DM Sans','Inter',system-ui,sans-serif"
    font-weight="900"
    font-size="48"
    letter-spacing="-2"
    text-anchor="middle"
    fill="#CA8A04">10X</text>
  <text
    x="50" y="84"
    font-family="'DM Sans','Inter',system-ui,sans-serif"
    font-weight="700"
    font-size="9"
    letter-spacing="2.5"
    text-anchor="middle"
    fill="#FAFAF9">AI</text>

  <!-- Wordmark -->
  <text
    x="130" y="78"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="900"
    font-size="96"
    letter-spacing="-4"
    fill="#0C0A09">10X</text>
  <rect x="325" y="40" width="3" height="38" fill="#CA8A04"/>
  <text
    x="338" y="78"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="700"
    font-size="60"
    letter-spacing="-1"
    fill="#0C0A09">AI</text>
</svg>
