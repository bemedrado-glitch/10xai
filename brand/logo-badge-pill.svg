<?xml version="1.0" encoding="UTF-8"?>
<!--
  10XAI pill badge  premium 3-color combo (black + gold + cream)
  Black pill, cream "10", gold "X", gold separator, cream "AI".
  Use as a stand-alone badge in promo materials, social, packaging.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="10XAI">
  <title>10XAI</title>
  <rect x="0" y="0" width="420" height="120" rx="60" fill="#0C0A09"/>
  <text
    x="40" y="88"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="900"
    font-size="96"
    letter-spacing="-4">
    <tspan fill="#FAFAF9">10</tspan><tspan fill="#CA8A04">X</tspan>
  </text>
  <rect x="235" y="50" width="3" height="38" fill="#CA8A04"/>
  <text
    x="248" y="88"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="700"
    font-size="60"
    letter-spacing="-1"
    fill="#FAFAF9">AI</text>
</svg>
