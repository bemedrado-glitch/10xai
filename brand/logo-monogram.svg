<?xml version="1.0" encoding="UTF-8"?>
<!--
  10XAI monogram — square mark, 1:1 ratio
  Use as app icon, social avatar, sticker, embossing, etc.
  Dark surface with gold mark inside.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="10XAI monogram">
  <title>10XAI</title>
  <rect width="128" height="128" rx="20" fill="#0C0A09"/>
  <text
    x="64" y="86"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="900"
    font-size="60"
    letter-spacing="-3"
    text-anchor="middle"
    fill="#CA8A04">10X</text>
  <rect x="32" y="100" width="64" height="2" fill="#FAFAF9" opacity="0.5"/>
  <text
    x="64" y="116"
    font-family="'DM Sans','Inter','Satoshi','General Sans',system-ui,sans-serif"
    font-weight="700"
    font-size="11"
    letter-spacing="3"
    text-anchor="middle"
    fill="#FAFAF9">AI</text>
</svg>
