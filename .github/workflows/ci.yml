name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings=0
        continue-on-error: false

      - name: Build (includes TypeScript typecheck)
        run: npx next build
        env:
          # Build needs URL-shaped env vars present even if not hit at build time.
          # Real values come from Vercel project env at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-key
          GOOGLE_PLACES_API_KEY: ci-placeholder
          RESEND_API_KEY: ci-placeholder
          CRON_SECRET: ci-placeholder
          ANTHROPIC_API_KEY: ci-placeholder
